<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Ming's Travel Log</title>
    <script>
      var segments = window.location.pathname.split('/').filter(Boolean)
      var base = segments.length > 0 ? '/' + segments[0] : ''
      var rest = segments.slice(1).join('/')
      var search = window.location.search ? '&' + window.location.search.slice(1) : ''
      window.location.replace(
        window.location.protocol + '//' + window.location.host +
        base + '/?p=' + encodeURIComponent(rest) + search + window.location.hash
      )
    </script>
  </head>
</html>
