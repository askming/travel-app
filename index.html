<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ming's Travel Log</title>
    <script>
      // Restore path encoded by 404.html redirect.
      (function () {
        var params = new URLSearchParams(window.location.search)
        var p = params.get('p')
        if (p) {
          p = decodeURIComponent(p).replace(/^\/+/, '') // strip any leading slashes
          var base = '/' + window.location.pathname.split('/').filter(Boolean)[0]
          params.delete('p')
          var search = params.toString() ? '?' + params.toString() : ''
          window.history.replaceState(null, '', base + '/' + p + search + window.location.hash)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
